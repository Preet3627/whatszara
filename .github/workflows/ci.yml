name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system flake8 mypy httpx mcp requests
      - name: Lint orchestrator
        run: flake8 orchestrator/ --max-line-length=120 --exclude=__pycache__
      - name: Lint MCP server
        run: flake8 whatsapp-mcp-server/ --max-line-length=120 --exclude=__pycache__

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path desktop-app/src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path desktop-app/src-tauri/Cargo.toml -- -D warnings
      - name: Check
        run: cargo check --manifest-path desktop-app/src-tauri/Cargo.toml

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Check Go bridge
        run: |
          cd whatsapp-bridge
          go vet ./...
          go build ./...

  test-orchestrator:
    name: Test Orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install httpx mcp requests pyyaml
      - name: Import check
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'orchestrator')
          from orchestrator.llm import ProviderRegistry, OllamaProvider, ClaudeProvider, GroqProvider, GrokProvider, GeminiProvider, VercelAIProvider
          from orchestrator.permissions.engine import PermissionEngine
          from orchestrator.permissions.risk_profiles import RiskLevel, get_risk_level
          from orchestrator.actions.shell import ShellExecutor
          from orchestrator.actions.apps import AppLauncher
          from orchestrator.actions.media import MediaController
          from orchestrator.actions.desktop import DesktopScanner
          from orchestrator.undo.journal import ActionJournal
          print('All imports OK')
          "
      - name: Test permission engine
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'orchestrator')
          from orchestrator.permissions.engine import PermissionEngine
          from orchestrator.permissions.risk_profiles import RiskLevel
          e = PermissionEngine()
          r = e.evaluate('execute_shell', {'cmd': 'ls'}, 'test@jid')
          assert r.risk_level == RiskLevel.HIGH
          assert 'recaptcha' in r.requires_action
          print('Permission engine OK')
          "
      - name: Test undo journal
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'orchestrator')
          from orchestrator.undo.journal import ActionJournal
          j = ActionJournal()
          e = j.record('set_volume', {'level': 80}, {'success': True}, reverse_action={'action': 'set_volume', 'params': {'level': 50}})
          assert len(j.get_reversible()) == 1
          j.mark_reversed(e.action_id)
          assert len(j.get_reversible()) == 0
          print('Undo journal OK')
          "

  build-desktop-ubuntu:
    name: Build Desktop (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Tauri deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: |
          cd desktop-app
          npm install
          npm run tauri build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatszara-linux
          path: desktop-app/src-tauri/target/release/bundle/
